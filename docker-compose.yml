services:
  db-migrate:
    build:
      context: .
      target: migrate
    environment:
      - DATABASE_URL=postgresql://newsprism:newsprism@db:5432/newsprism
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  batch:
    build:
      context: .
      dockerfile: Dockerfile.go
      target: batch
    environment:
      - DATABASE_URL=postgresql://newsprism:newsprism@db:5432/newsprism
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}
      - EMBED_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}
      - LLM_MODEL=${LLM_MODEL:-ggml-org/gemma3:4b}
      - CLASSIFY_MODEL=${CLASSIFY_MODEL:-ggml-org/gemma3:4b}
      - EMBED_MODEL=${EMBED_MODEL:-multilingual-e5-large-instruct-q8_0}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.go
      target: server
    ports:
      - "8091:8091"
    environment:
      - DATABASE_URL=postgresql://newsprism:newsprism@db:5432/newsprism
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}
      - EMBED_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}
      - LLM_MODEL=${LLM_MODEL:-ggml-org/gemma3:4b}
      - CLASSIFY_MODEL=${CLASSIFY_MODEL:-ggml-org/gemma3:4b}
      - EMBED_MODEL=${EMBED_MODEL:-multilingual-e5-large-instruct-q8_0}
      - API_PORT=8091
      - BATCH_SERVER_URL=http://batch:8090
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/api/config"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* はビルド時に展開される — ブラウザから見える Go API URL を指定
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8091}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # コンテナ間リクエストを許可
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LLMモデルと埋め込みモデルを両方Pull
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - EMBED_MODEL=${EMBED_MODEL:-multilingual-e5-large-instruct-q8_0}
    entrypoint: >
      sh -c "ollama pull $${OLLAMA_MODEL:-llama3.2} && ollama pull $${EMBED_MODEL:-multilingual-e5-large-instruct-q8_0}"
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: newsprism
      POSTGRES_USER: newsprism
      POSTGRES_PASSWORD: newsprism
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsprism -d newsprism"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ollama_data:
  pgdata:
