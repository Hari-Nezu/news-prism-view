# 開発用: Next.jsをホットリロードで起動
# 使い方: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Go サービス（batch/api）はホストで go run するため通常は起動しない。
# コンテナで Go サービスも動かしたい場合:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile go up
services:
  app:
    build:
      context: .
      target: deps
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      # dev では Go API をホストで直接 go run するため localhost を向く
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8091}
    depends_on: {}

  # batch/api は --profile go を付けた時だけ起動（通常はホストで go run）
  batch:
    profiles: ["go"]

  api:
    profiles: ["go"]
