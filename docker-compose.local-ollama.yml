# ホストで起動済みの Ollama を使う構成
# Ollama・ollama-init は起動しない
#
# 使い方:
#   docker compose -f docker-compose.local-ollama.yml up
#
# 前提:
#   - ホストで Ollama が起動済み（LLM_BASE_URL で指定）
#   - 必要なモデルが pull 済み
services:
  db-migrate:
    build:
      context: .
      target: migrate
    environment:
      - DATABASE_URL=postgresql://newsprism:newsprism@db:5432/newsprism
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  batch:
    build:
      context: .
      dockerfile: Dockerfile.go
      target: batch
    environment:
      - DATABASE_URL=postgresql://newsprism:newsprism@db:5432/newsprism
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host-gateway:8080}
      - EMBED_BASE_URL=${LLM_BASE_URL:-http://host-gateway:8080}
      - LLM_MODEL=${LLM_MODEL:-ggml-org/gemma3:4b}
      - CLASSIFY_MODEL=${CLASSIFY_MODEL:-ggml-org/gemma3:4b}
      - EMBED_MODEL=${EMBED_MODEL:-multilingual-e5-large-instruct-q8_0}
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.go
      target: server
    ports:
      - "8091:8091"
    environment:
      - DATABASE_URL=postgresql://newsprism:newsprism@db:5432/newsprism
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host-gateway:8080}
      - EMBED_BASE_URL=${LLM_BASE_URL:-http://host-gateway:8080}
      - LLM_MODEL=${LLM_MODEL:-ggml-org/gemma3:4b}
      - CLASSIFY_MODEL=${CLASSIFY_MODEL:-ggml-org/gemma3:4b}
      - EMBED_MODEL=${EMBED_MODEL:-multilingual-e5-large-instruct-q8_0}
      - API_PORT=8091
      - BATCH_SERVER_URL=http://batch:8090
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/api/config"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8091}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: newsprism
      POSTGRES_USER: newsprism
      POSTGRES_PASSWORD: newsprism
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsprism -d newsprism"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
