<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景 -->
  <rect width="64" height="64" fill="#ffffff" rx="12"/>

  <!-- 外枠（淡いグレー） -->
  <rect width="64" height="64" fill="none" stroke="#e5e7eb" stroke-width="1" rx="12"/>

  <!-- 3軸グラフの象限背景 -->
  <rect x="8" y="8" width="20" height="20" fill="#fef3c7" opacity="0.6"/>
  <rect x="28" y="8" width="20" height="20" fill="#dbeafe" opacity="0.6"/>
  <rect x="8" y="28" width="20" height="20" fill="#fee2e2" opacity="0.6"/>
  <rect x="28" y="28" width="20" height="20" fill="#d1fae5" opacity="0.6"/>

  <!-- グリッド線（中心十字） -->
  <line x1="18" y1="8" x2="18" y2="48" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="8" y1="28" x2="48" y2="28" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- ニュースペーパーラインズ（左上象限） -->
  <line x1="10" y1="16" x2="16" y2="16" stroke="#92400e" stroke-width="1"/>
  <line x1="10" y1="19" x2="16" y2="19" stroke="#92400e" stroke-width="0.8"/>
  <line x1="10" y1="22" x2="14" y2="22" stroke="#92400e" stroke-width="0.8"/>

  <!-- プラスマークの点（右上象限 - 革新） -->
  <circle cx="38" cy="18" r="3.5" fill="#1d4ed8" opacity="0.8"/>

  <!-- 下降矢印（左下象限） -->
  <path d="M 14 35 L 14 40 M 11 38 L 14 40 L 17 38" stroke="#dc2626" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 上昇矢印（右下象限） -->
  <path d="M 38 43 L 38 33 M 35 35 L 38 33 L 41 35" stroke="#16a34a" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- トップタイトル：NewsPrism イニシャル（NP） -->
  <g transform="translate(32, 56)">
    <text x="0" y="0" font-size="7" font-weight="bold" fill="#374151" text-anchor="middle" font-family="sans-serif">NP</text>
  </g>
</svg>
