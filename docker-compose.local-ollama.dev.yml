# ホスト Ollama + ホットリロード開発用オーバーライド
#
# 使い方:
#   docker compose -f docker-compose.local-ollama.yml -f docker-compose.local-ollama.dev.yml up
#
# Go サービスをコンテナで動かす場合:
#   docker compose -f docker-compose.local-ollama.yml -f docker-compose.local-ollama.dev.yml --profile go up
services:
  app:
    build:
      context: .
      target: deps
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8091}
    depends_on: {}

  batch:
    profiles: ["go"]

  api:
    profiles: ["go"]
